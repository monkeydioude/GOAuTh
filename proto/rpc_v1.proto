syntax = "proto3";

package v1;

import "google/protobuf/timestamp.proto";

option go_package = "pkg/grpc/v1";

service Auth {
    rpc Signup(UserRequest) returns (Response) {}
    rpc Login(UserRequest) returns (Response) {}
    rpc Delete(AuthIdRequest) returns (Response) {}
}

message StatusIn {
    string accessToken = 1;
    string refreshToken = 2;
}

message StatusOut {
    bool accessTokenValid = 1;
    bool refreshTokenValid = 2;
}

message RefreshIn {
    string refreshToken = 1;
    optional int64 access_expires_in_seconds = 2;
    optional int64 refresh_expires_in_seconds = 3;
}

message RefreshOut {
    string accessToken = 1;
    int64 access_expires_at = 2;
    string refreshToken = 3;
    int64 refresh_expires_at = 4;
}

service JWT {
    rpc Status(StatusIn) returns (StatusOut) {}
    rpc Refresh(RefreshIn) returns (RefreshOut) {}
}

service User {
    rpc Deactivate(Empty) returns (Response) {}
    rpc EditUser(EditUserRequest) returns (Response) {}
}

service UserAction {
    rpc Create(UserActionRequest) returns (Response) {}
    rpc Validate(UserActionValidation) returns (Response) {}
    rpc Status(UserActionRequest) returns (UserActionStatusResponse) {}
}

message UserRequest {
    string login = 1;
    string password = 2;
    string realm = 3;
    optional int64 access_expires_in_seconds = 4;
    optional int64 refresh_expires_in_seconds = 5;
}

message AuthIdRequest {
    int32 uid = 1;
    string reason = 2;
}

message Response {
    int32 code = 1;
    string message = 2;
    string identifier = 3;
}

message EditUserRequest {
    string new_login = 1;
    string new_password = 2;
    string password = 3;
}

message UserActionRequest {
    string login = 1;
    string realm = 2;
    string action = 3;
    string data = 4;
}

message UserActionValidation {
    string realm = 1;
    string data = 2;
    string against = 3;
}

message UserActionStatus {
    string login = 1;
    string realm = 2;
    string action = 3;
    string data = 4;
    google.protobuf.Timestamp created_at = 5;
    google.protobuf.Timestamp updated_at = 6;
    google.protobuf.Timestamp validated_at = 7;
}

message UserActionStatusResponse {
    int32 code = 1;
    string message = 2;
    repeated UserActionStatus statuses = 3;
}

message Empty {}